<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMatch - Advanced Recruiter Platform</title>
    
    <!-- Google Fonts -->
    <script>
        window.addEventListener('error', function(e) {
            console.error(e);
            var errDiv = document.getElementById('error-diagnostic-overlay');
            if (!errDiv) {
                errDiv = document.createElement('div');
                errDiv.id = 'error-diagnostic-overlay';
                errDiv.style.position = 'fixed';
                errDiv.style.top = '10px';
                errDiv.style.left = '10px';
                errDiv.style.right = '10px';
                errDiv.style.background = '#800';
                errDiv.style.color = '#fff';
                errDiv.style.padding = '20px';
                errDiv.style.borderRadius = '8px';
                errDiv.style.fontFamily = 'monospace';
                errDiv.style.fontSize = '14px';
                errDiv.style.zIndex = '99999';
                errDiv.style.whiteSpace = 'pre-wrap';
                errDiv.style.boxShadow = '0 5px 20px rgba(0,0,0,0.5)';
                errDiv.style.border = '2px solid red';
                document.body.appendChild(errDiv);
            }
            errDiv.textContent = 'UNCAUGHT RUNTIME ERROR:\n' + e.message + '\n\nSource: ' + e.filename + '\nLine: ' + e.lineno + ', Col: ' + e.colno + '\n\nStack:\n' + (e.error ? e.error.stack : 'N/A');
        });
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ChartJS library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="./src/styles/theme.css">
    <link rel="stylesheet" href="./src/styles/components.css">
</head>
<body>
    <!-- Background glowing orbs for glassmorphism layout -->
    <div class="radial-glow glow-1"></div>
    <div class="radial-glow glow-2"></div>
    <div class="radial-glow glow-3"></div>

    <div id="root"></div>

    <!-- React App Mounting -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
